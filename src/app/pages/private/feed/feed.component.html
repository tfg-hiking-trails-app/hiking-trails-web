<h1 class="text-white">Feed</h1>

@if (hikingTrails() === undefined) {
  <div class="flex justify-center items-center">
    <mat-spinner></mat-spinner>
  </div>
} @else {
  <p class="text-white">{{ hikingTrails()?.pageNumber }}</p>

  @for (hikingTrail of hikingTrails()?.content; track $index) {
    <pre class="text-white">{{ hikingTrail.name }}</pre>
  }
}
