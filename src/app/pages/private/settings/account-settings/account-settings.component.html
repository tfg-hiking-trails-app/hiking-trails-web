<div class="flex flex-col rounded-xl bg-white/5 dark:bg-neutral-900/40 ring-1 ring-white/10 shadow-sm p-5">

  <app-settings-edit-password />
  <mat-divider class="!mt-5 !mb-2 !border-t-white" />

  <app-settings-edit-username />
  <mat-divider class="!mt-5 !mb-2 !border-t-white" />

  <div class="flex justify-end mt-2">
    <button
      class="bg-red-500 hover:bg-red-700 text-white font-semibold py-2 rounded-full px-10 cursor-pointer shadow-sm transition-colors"
      (click)="deleteAccount()"
    >
      {{ 'settings.account.delete-account' | translate }}
    </button>
  </div>
</div>
