<span class="text-white font-medium text-2xl">
  {{ `settings.account.change-username` | translate }}:
</span>

<form [formGroup]="editUsernameForm" (ngSubmit)="changeUsername()">
  <div class="flex flex-col mt-2">
    <div class="w-full">
      <mat-form-field class="w-full" appearance="fill">
        <mat-label>{{ 'settings.account.new-username' | translate }}:</mat-label>
        <input matInput type="text" formControlName="username" required>
        @if (submitted && editUsernameControls['username'].hasError('required')) {
          <mat-error>{{ 'settings.account.username-required' | translate }}</mat-error>
        }
      </mat-form-field>
    </div>

    <div class="flex gap-2">
      <button class="w-full" type="submit" matButton="filled">
        {{ 'settings.account.change-username' | translate }}
      </button>
      <button class="w-full" type="reset" matButton="tonal">
        {{ 'clear-data' | translate }}
      </button>
    </div>
  </div>
</form>
