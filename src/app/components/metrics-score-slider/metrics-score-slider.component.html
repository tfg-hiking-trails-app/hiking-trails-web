<div class="bg-black p-5 rounded-2xl">
  @if (isLoading()) {
    <app-loading-spinner />
  } @else {
    <div class="grid grid-cols-2 gap-x-6 gap-y-4">
      @for (metric of metrics; track $index) {
        <div class="w-full min-w-0">
          <div class="flex justify-between gap-2">
            <label class="text-xl min-w-0 break-words">{{ metric.label |  translate }}</label>
            <label class="text-xl shrink-0">{{slider.value}}</label>
          </div>
          <mat-slider
              class="w-full"
              [disabled]="disabled"
              [max]="max"
              [min]="min"
              [step]="step"
              [discrete]="thumbLabel"
              [showTickMarks]="showTicks">
            <input matSliderThumb [(ngModel)]="metric.value" #slider>
          </mat-slider>
        </div>
      }
    </div>
  }

  <div class="w-full">
    <button class="w-full" matButton="filled" (click)="saveChanges()">
      {{ 'metrics-score.save-changes' | translate}}
    </button>
  </div>
</div>
