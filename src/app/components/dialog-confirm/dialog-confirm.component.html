<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content class="mat-typography">
  <p>{{ data.message }}</p>
</mat-dialog-content>

@if (focusCancel) {
  <mat-dialog-actions align="end">
    <button
      mat-button
      mat-dialog-close
      cdkFocusInitial
    >
      {{ 'dialog.no' | translate }}
    </button>
    <button
      mat-button
      [mat-dialog-close]="true"
      (click)="deleteConfirmed()"
    >
      {{ 'dialog.yes' | translate }}
    </button>
  </mat-dialog-actions>
} @else {
  <mat-dialog-actions align="end">
    <button
      mat-button
      mat-dialog-close
    >
      {{ 'dialog.no' | translate }}
    </button>
    <button
      mat-button
      [mat-dialog-close]="true"
      (click)="deleteConfirmed()"
      cdkFocusInitial
    >
      {{ 'dialog.yes' | translate }}
    </button>
  </mat-dialog-actions>
}
