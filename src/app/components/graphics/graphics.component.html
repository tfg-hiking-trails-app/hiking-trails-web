@if (graphicsData.length > 0) {
  <div class="w-full lg:w-11/12 lg:m-auto space-y-4 rounded-2xl bg-white/5 dark:bg-neutral-900/40 ring-1 ring-white/10 shadow-sm p-4">
    <!-- Carga diferida: cada gráfico se monta cuando el hilo está ocioso / entra en viewport -->
    @defer (on idle) {
      <app-line-chart [labels]="labels" [datasets]="heartRateData" />
    } @placeholder {
      <div class="h-48 w-full max-w-4xl rounded-xl bg-white/10 animate-pulse"></div>
    }

    @defer (on viewport) {
      <app-line-chart [labels]="labels" [datasets]="altitudeData" />
    } @placeholder {
      <div class="h-48 w-full max-w-4xl rounded-xl bg-white/10 animate-pulse mt-4"></div>
    }

    @defer (on viewport) {
      <app-line-chart [labels]="labels" [datasets]="cadenceData" />
    } @placeholder {
      <div class="h-48 w-full max-w-4xl rounded-xl bg-white/10 animate-pulse mt-4"></div>
    }

    @defer (on viewport) {
      <app-line-chart [labels]="labels" [datasets]="speedData" />
    } @placeholder {
      <div class="h-48 w-full max-w-4xl rounded-xl bg-white/10 animate-pulse mt-4"></div>
    }

    @defer (on viewport) {
      <app-line-chart [labels]="labels" [datasets]="distanceData" />
    } @placeholder {
      <div class="h-48 w-full max-w-4xl rounded-xl bg-white/10 animate-pulse mt-4"></div>
    }
  </div>
}
