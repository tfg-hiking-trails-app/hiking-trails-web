<button
  class="bg-orange-600 hover:bg-orange-700 dark:bg-blue-500 dark:hover:bg-blue-700
    text-white font-medium py-2 px-2 rounded flex items-center cursor-pointer"
  [matMenuTriggerFor]="addActivityMenu"
>
  <span class="material-icons">add</span>
  <span class="ml-1 mt-0.5">
    {{ 'navbar.add-activity-menu.add-activity' | translate }}
  </span>
</button>
<mat-menu #addActivityMenu="matMenu">
  <button mat-menu-item (click)="openAddActivityManuallyDialog()">
    <mat-icon>edit_note</mat-icon>
    <span class="text-lg mt-0.5 font-medium">
      {{ 'navbar.add-activity-menu.add-manually' | translate }}
    </span>
  </button>
  <button mat-menu-item (click)="fileInput.click()">
    <mat-icon>upload_file</mat-icon>
    <span class="text-lg mt-0.5 font-medium">
      {{ 'navbar.add-activity-menu.upload-fit-file' | translate }}
    </span>
  </button>
</mat-menu>

<input
  type="file"
  accept=".fit"
  hidden
  #fileInput
  (change)="uploadFitFile($event)"
/>
